>
  <defs id="defs1">
    <style id="theme-colors" type="text/css"><![CDATA[
      :root {
        --logo-primary: #2a4053;
        --logo-body: #171e24;
        --logo-amber: #d8860c;
        --logo-amber-soft: #c97708;
        --logo-amber-hot: #f3a42e;
        --logo-green: #26c93b;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --logo-primary: #175a66;
          --logo-body: #addbf3;
          --logo-amber: #d8860c;
          --logo-amber-soft: #c97708;
          --logo-amber-hot: #f7b548;
          --logo-green: #26c93b;
        }
      }

      #path1,
      #path2,
      #path3 {
        fill: var(--logo-primary) !important;
      }

      #path4,
      #path5,
      #path7 {
        fill: var(--logo-body) !important;
      }

      #path6 {
        fill: var(--logo-amber) !important;
      }

      #path7-9 {
        fill: var(--logo-amber);
      }

      #path7-9-2 {
        fill: var(--logo-green) !important;
      }

      @keyframes waveOscillate {
        0%,
        100% {
          transform: skewX(0deg) scaleX(1) scaleY(1);
        }
        25% {
          transform: skewX(1.6deg) scaleX(1.01) scaleY(0.992);
        }
        50% {
          transform: skewX(0deg) scaleX(0.996) scaleY(1.024);
        }
        75% {
          transform: skewX(-1.6deg) scaleX(1.01) scaleY(0.992);
        }
      }

      @keyframes wingDrift {
        0%,
        100% {
          transform: translateX(0px);
        }
        50% {
          transform: translateX(1.4px);
        }
      }

      @keyframes badgePulse {
        0%,
        60%,
        100% {
          transform: scale(1);
        }
        66% {
          transform: scale(1.08);
        }
        72% {
          transform: scale(1.14);
        }
        78% {
          transform: scale(1.06);
        }
        84% {
          transform: scale(1.12);
        }
        90% {
          transform: scale(1);
        }
      }

      @keyframes leftCircleColor {
        0%,
        100% {
          fill: var(--logo-amber-soft);
        }
        50% {
          fill: var(--logo-amber-hot);
        }
      }

      @keyframes lightningFlash {
        0%,
        72%,
        100% {
          transform: scale(1) skewX(0deg);
          opacity: 0.88;
          filter: none;
        }
        74% {
          transform: scale(1.14) skewX(-3deg);
          opacity: 1;
          filter: drop-shadow(0 0 4px rgba(255, 209, 102, 0.95));
        }
        76% {
          transform: scale(0.98) skewX(2deg);
          opacity: 0.92;
          filter: none;
        }
        78% {
          transform: scale(1.12) skewX(-2deg);
          opacity: 1;
          filter: drop-shadow(0 0 5px rgba(255, 209, 102, 1));
        }
        82% {
          transform: scale(1) skewX(0deg);
          opacity: 0.9;
          filter: none;
        }
      }

      @keyframes accentGlow {
        0%,
        100% {
          opacity: 0.9;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes gearSway {
        0%,
        100% {
          transform: rotate(-5deg);
        }
        50% {
          transform: rotate(5deg);
        }
      }

      #path1,
      #path2,
      #path3,
      #path6,
      #path7-9,
      #path7-9-2 {
        transform-box: fill-box;
        transform-origin: center;
      }

      #path1 {
        animation: waveOscillate 2.8s ease-in-out infinite;
      }

      #path2 {
        animation: wingDrift 3.2s ease-in-out -0.9s infinite;
      }

      #path3 {
        animation: wingDrift 3.2s ease-in-out -1.8s infinite;
      }

      #gear-group {
        transform-box: view-box;
        transform-origin: 104.33634px 135.49387px;
        animation: gearSway 2.4s ease-in-out infinite;
      }

      #path7-9-2 {
        animation: badgePulse 2.9s linear infinite;
      }

      #path6 {
        animation: accentGlow 2.2s ease-in-out infinite;
      }

      #path6 {
        animation: lightningFlash 2.8s linear infinite;
      }

      #path7-9 {
        animation: leftCircleColor 2.2s ease-in-out infinite;
      }

      @media (prefers-reduced-motion: reduce) {
        #path1,
        #path2,
        #path3,
        #gear-group,
        #path6,
        #path7-9,
        #path7-9-2 {
          animation: none !important;
        }
      }
    ]]></style>
  </defs>

