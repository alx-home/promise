name: PR Tests

on:
   pull_request:
      branches:
         - master
   workflow_dispatch:

jobs:
   promise-tests:
      name: Build and run promise tests
      runs-on: ubuntu-24.04

      steps:
         - uses: actions/checkout@v4

         - name: Install build tools
           run: |
              sudo apt-get update
              sudo apt-get install -y cmake ninja-build gcc-14 g++-14

         - name: Configure
           run: >-
              cmake
              -S .
              -B build
              -G Ninja
              -DCMAKE_C_COMPILER=gcc-14
              -DCMAKE_CXX_COMPILER=g++-14
              -DCMAKE_BUILD_TYPE=Debug
              -DPROMISE_BUILD_TESTS=ON

         - name: Build tests
           run: cmake --build build --target promise_test --config Debug

         - name: Run tests
           timeout-minutes: 1
           run: ctest --test-dir build --output-on-failure

   linux-release-gcc:
      name: Linux Release with gcc-14
      runs-on: ubuntu-24.04

      steps:
         - uses: actions/checkout@v4
           with:
              fetch-depth: 0

         - name: Install build tools
           run: |
              sudo apt-get update
              sudo apt-get install -y cmake ninja-build gcc-14 g++-14

         - name: Configure Release
           run: >-
              cmake
              -S .
              -B build-release
              -G Ninja
              -DCMAKE_C_COMPILER=gcc-14
              -DCMAKE_CXX_COMPILER=g++-14
              -DCMAKE_BUILD_TYPE=Release
              -DPROMISE_BUILD_TESTS=OFF

         - name: Build release library
           run: cmake --build build-release --target alx-home_promise --config Release

         - name: Collect release library artifacts
           run: |
              mkdir -p release-artifacts
              find build-release -type f \( -name "*.a" -o -name "*.so" -o -name "*.dylib" \) -print0 | while IFS= read -r -d '' lib; do
                cp "$lib" release-artifacts/
              done
              test -n "$(ls -A release-artifacts)"

         - name: Upload release library artifacts
           uses: actions/upload-artifact@v4
           with:
              name: promise-release-linux-gcc-${{ github.ref_name }}
              path: release-artifacts/

   linux-release-clang:
      name: Linux Release with clang
      runs-on: ubuntu-24.04

      steps:
         - uses: actions/checkout@v4
           with:
              fetch-depth: 0

         - name: Install build tools
           run: |
              sudo apt-get update
              sudo apt-get install -y cmake ninja-build clang

         - name: Configure Release
           run: >-
              cmake
              -S .
              -B build-release
              -G Ninja
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMAKE_BUILD_TYPE=Release
              -DPROMISE_BUILD_TESTS=OFF

         - name: Build release library
           run: cmake --build build-release --target alx-home_promise --config Release

         - name: Collect release library artifacts
           run: |
              mkdir -p release-artifacts
              find build-release -type f \( -name "*.a" -o -name "*.so" -o -name "*.dylib" \) -print0 | while IFS= read -r -d '' lib; do
                cp "$lib" release-artifacts/
              done
              test -n "$(ls -A release-artifacts)"

         - name: Upload release library artifacts
           uses: actions/upload-artifact@v4
           with:
              name: promise-release-linux-clang-${{ github.ref_name }}
              path: release-artifacts/

   windows-release-clang-cl:
      name: Windows Release with clang-cl
      runs-on: windows-latest

      steps:
         - uses: actions/checkout@v4
           with:
              fetch-depth: 0

         - name: Install Ninja and LLVM
           run: |
              choco install -y ninja
              choco install -y llvm
           shell: powershell

         - name: Verify clang-cl
           run: clang-cl --version

         - name: Configure Windows Release with clang-cl
           run: |
              cmake -S . -B build-windows -G Ninja ^
                -DCMAKE_C_COMPILER=clang-cl ^
                -DCMAKE_CXX_COMPILER=clang-cl ^
                -DCMAKE_BUILD_TYPE=Release ^
                -DPROMISE_BUILD_TESTS=OFF
           shell: cmd

         - name: Build Windows release library
           run: cmake --build build-windows --config Release --target alx-home_promise
           shell: cmd

         - name: Collect Windows release artifacts
           run: |
              mkdir -p release-artifacts-windows
              for /r build-windows %%f in (*.lib *.dll *.a *.so) do copy "%%f" release-artifacts-windows\
              if not exist release-artifacts-windows\ ( exit 1 )
           shell: cmd

         - name: Upload Windows release artifacts
           uses: actions/upload-artifact@v4
           with:
              name: promise-release-windows-clang-cl-${{ github.ref_name }}
              path: release-artifacts-windows/

   windows-release-msvc:
      name: Windows Release with cl.exe (MSVC)
      runs-on: windows-latest

      steps:
         - uses: actions/checkout@v4
           with:
              fetch-depth: 0

         - name: Install Ninja
           run: choco install -y ninja
           shell: powershell

         - name: Configure Windows Release with cl.exe
           run: |
              cmake -S . -B build-msvc -G "Ninja" ^
                -DCMAKE_C_COMPILER=cl.exe ^
                -DCMAKE_CXX_COMPILER=cl.exe ^
                -DCMAKE_BUILD_TYPE=Release ^
                -DPROMISE_BUILD_TESTS=OFF
           shell: cmd

         - name: Build Windows release library
           run: cmake --build build-msvc --config Release --target alx-home_promise
           shell: cmd

         - name: Collect Windows release artifacts
           run: |
              mkdir -p release-artifacts-msvc
              for /r build-msvc %%f in (*.lib *.dll *.a *.so) do copy "%%f" release-artifacts-msvc\
              if not exist release-artifacts-msvc\ ( exit 1 )
           shell: cmd

         - name: Upload Windows release artifacts
           uses: actions/upload-artifact@v4
           with:
              name: promise-release-windows-msvc-${{ github.ref_name }}
              path: release-artifacts-msvc/
