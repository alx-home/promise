name: PR Tests

on:
   pull_request:
      branches:
         - master
   workflow_dispatch:

jobs:
   promise-tests:
      name: Build and run promise tests
      runs-on: ubuntu-latest

      steps:
         - uses: actions/checkout@v4

         - name: Install build tools
           run: |
              sudo apt-get update
              sudo apt-get install -y cmake ninja-build g++

         - name: Configure
           run: >-
              cmake
              -S .
              -B build
              -G Ninja
              -DCMAKE_BUILD_TYPE=Debug
              -DPROMISE_BUILD_TESTS=ON

         - name: Build tests
           run: cmake --build build --target promise_test --config Debug

         - name: Run tests
           timeout-minutes: 1
           run: ctest --test-dir build --output-on-failure
